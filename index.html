<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>С днём рождения</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: "Georgia", serif;
    }

    .frame {
        padding: 40px 60px;
        border: 2px solid #ff33cc;
        border-radius: 18px;
        box-shadow:
            0 0 8px #ff33cc,
            0 0 20px #ff33cc,
            0 0 50px #ff00b3,
            inset 0 0 20px rgba(255, 0, 179, 0.08);
        animation: pulse 3s ease-in-out infinite;
        text-align: center;
    }

    @keyframes pulse {
        0%, 100% {
            box-shadow:
                0 0 8px #ff33cc,
                0 0 20px #ff33cc,
                0 0 50px #ff00b3,
                inset 0 0 20px rgba(255, 0, 179, 0.08);
        }
        50% {
            box-shadow:
                0 0 12px #ff66dd,
                0 0 35px #ff33cc,
                0 0 80px #ff00cc,
                inset 0 0 30px rgba(255, 0, 200, 0.13);
        }
    }

    .text {
        color: #ff4dd8;
        font-size: 36px;
        text-shadow:
            0 0 8px #ff4dd8,
            0 0 20px #ff00b3,
            0 0 45px #ff00ff;
        letter-spacing: 0.03em;
        animation: fadein 1.2s ease;
    }

    @keyframes fadein {
        from { opacity: 0; transform: scale(0.96); }
        to   { opacity: 1; transform: scale(1); }
    }

    @media (max-width: 500px) {
        .frame { padding: 30px 30px; }
        .text { font-size: 26px; }
    }
</style>
</head>
<body>
    <div class="frame">
        <span class="text">С днём рождения тебя)</span>
    </div>
</body>
</html>
